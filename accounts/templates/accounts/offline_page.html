{% extends 'base.html' %}
{% load static %}

{% block title %}Offline Mode{% endblock %}

{% block content %}

<div class="offline-container" style="text-align: center; padding: 50px;">
    <i class="fas fa-wifi" style="font-size: 64px; color: #f59e0b; margin-bottom: 20px;"></i>
    <h1>You're Offline</h1>
    <p>Please check your internet connection.</p>
    <p>Some features may be limited until you reconnect.</p>
    <button onclick="location.reload()" class="btn-primary" style="margin-top: 20px;">
        <i class="fas fa-sync-alt"></i> Try Again
    </button>
</div>

{% endblock %}
