{% extends 'base.html' %}

{% block title %}Add School{% endblock %}

{% block content %}

<div class="dashboard-header">
    <h1>Add New School</h1>
</div>

<div class="card" style="max-width: 500px; margin: 0 auto;">
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>School Name *</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>School Code *</label>
            <input type="text" name="code" class="form-control" placeholder="lowercase, no spaces" required>
            <small>Used for subdomain: code.edunexus.com</small>
        </div>
        <div class="form-group">
            <label>Email *</label>
            <input type="email" name="email" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Phone *</label>
            <input type="tel" name="phone" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Address</label>
            <textarea name="address" class="form-control" rows="2"></textarea>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Create School</button>
            <a href="{% url 'super_admin_schools' %}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>

{% endblock %}
