{% extends 'base.html' %}
{% load static %}

{% block title %}Add Subject{% endblock %}

{% block content %}

<div class="register-container">
    <div class="register-header">
        <h1>Add New Subject</h1>
        <p>Register a new subject to be taught in the school.</p>
    </div>

    <div class="register-form active">
        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>Subject Name <span class="required">*</span></label>
                    <input type="text" name="name" placeholder="e.g., Mathematics, English" required>
                </div>

                <div class="form-group">
                    <label>Subject Code <span class="required">*</span></label>
                    <input type="text" name="code" placeholder="e.g., MATH101, ENG101" required>
                </div>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="4" placeholder="Brief description of the subject"></textarea>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Subject
                </button>
                <a href="{% url 'subject_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
