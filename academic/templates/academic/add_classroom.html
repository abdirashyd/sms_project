{% extends 'base.html' %}
{% load static %}

{% block title %}Add Classroom{% endblock %}

{% block content %}

<div class="register-container">
    <div class="register-header">
        <h1>Add New Classroom</h1>
        <p>Create a class with stream, fee structure, and teacher assignment.</p>
    </div>

    <div class="register-form active">
        <form method="POST">
            {% csrf_token %}

            <div class="form-row">
                <div class="form-group">
                    <label>Class Name <span class="required">*</span></label>
                    <input type="text" name="name" placeholder="e.g., Grade 8, Form 3" required>
                </div>

                <div class="form-group">
                    <label>Stream <span class="required">*</span></label>
                    <input type="text" name="stream" placeholder="e.g., North, A, East" required>
                </div>
            </div>

           

            <div class="form-group">
                <label>Class Teacher</label>
                <select name="class_teacher">
                    <option value="">-- Select Teacher --</option>
                    {% for teacher in teachers %}
                        <option value="{{ teacher.id }}">
                            {{ teacher.get_full_name|default:teacher.username }}
                            {% if teacher.email %} ({{ teacher.email }}){% endif %}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Classroom
                </button>
                <a href="{% url 'classroom_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

<style>
/* Additional button styles */
.btn-secondary {
    background: #6c757d;
    color: white;
    padding: 10px 30px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 16px;
    text-decoration: none;
    display: inline-block;
}

.btn-secondary:hover {
    background: #5a6268;
}

.form-actions {
    display: flex;
    gap: 15px;
    justify-content: center;
}
</style>

{% endblock %}
