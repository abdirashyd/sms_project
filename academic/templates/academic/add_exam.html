{% extends 'base.html' %}
{% load static %}

{% block title %}Add Exam{% endblock %}

{% block content %}

<div class="register-container">
    <div class="register-header">
        <h1>Add New Exam</h1>
        <p>Register a new examination session.</p>
    </div>

    <div class="register-form active">
        <form method="POST" action="{% url 'add_exam' %}">
            {% csrf_token %}

            <div class="form-group">
                <label>Exam Name <span class="required">*</span></label>
                <input type="text" name="name" placeholder="e.g., End of Term Exam 2026" required>
            </div>

            <div class="form-group">
                <label>Exam Type <span class="required">*</span></label>
                <select name="exam_type" required>
                    {% for code, name in exam_type %}
                        <option value="{{ code }}">{{ name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label>Date Started <span class="required">*</span></label>
                <input type="datetime-local" name="date_started" required>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary">
                    <i class="fas fa-save"></i> Save Exam
                </button>
                <a href="{% url 'exam_list' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
